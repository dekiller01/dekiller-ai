<!DOCTYPE html>
<html>
<head>
  <title>Dekiller AI</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }
.code-block {
  background: #000;
  color: #0f0;
  padding: 10px;
  border-radius: 8px;
  position: relative;
  overflow-x: auto;
}

.code-block button {
  position: absolute;
  top: 5px;
  right: 5px;
  background: #333;
  color: white;
  border: none;
  padding: 5px;
  cursor: pointer;
}

    #chat {
      max-width: 600px;
      margin: auto;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
    }

    .user {
      background: #2a2a2a;
      text-align: right;
    }

    .bot {
      background: #444;
      text-align: left;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
    }
  </style>
</head>
<body>

<h2>Dekiller AI 🤖</h2>

<div id="chat"></div>

<input id="msg" placeholder="Escribe algo..." />
<button onclick="send()">Enviar</button>

<script>
async function send() {
  const input = document.getElementById("msg");
  const message = input.value;

  if (!message) return;

  const chat = document.getElementById("chat");

  // 👤 mensaje usuario
  chat.innerHTML += `<div class="msg user">${message}</div>`;

  input.value = "";

  try {
    const res = await fetch("https://dekiller-ai.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: message })
    });

    const data = await res.json();

    // 🤖 respuesta IA
chat.innerHTML += `<div class="msg bot">${formatMessage(data.reply)}</div>`;
  } catch (err) {
    chat.innerHTML += `<div class="msg bot">❌ Error conectando con la IA</div>`;
    console.error(err);
  }
}
function formatMessage(text) {
  return text.replace(/```([\s\S]*?)```/g, (match, code) => {
    return `
      <pre class="code-block">
        <button onclick="copyCode(this)">Copiar</button>
        <code>${code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code>
      </pre>
    `;
  });
}

function copyCode(btn) {
  const code = btn.nextElementSibling.innerText;
  navigator.clipboard.writeText(code);
  btn.innerText = "✅ Copiado";
  setTimeout(() => btn.innerText = "Copiar", 2000);
}
</script>

</body>
</html>
