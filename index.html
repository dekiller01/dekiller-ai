<!DOCTYPE html>
<html>
<head>
  <title>Dekiller AI</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    #chat {
      max-width: 600px;
      margin: auto;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
    }

    .user {
      background: #2a2a2a;
      text-align: right;
    }

    .bot {
      background: #444;
      text-align: left;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
    }
  </style>
</head>
<body>

<h2>Dekiller AI 🤖</h2>

<div id="chat"></div>

<input id="msg" placeholder="Escribe algo..." />
<button onclick="send()">Enviar</button>

<script>
async function send() {
  const input = document.getElementById("msg");
  const message = input.value;

  if (!message) return;

  const chat = document.getElementById("chat");

  // 👤 mensaje usuario
  chat.innerHTML += `<div class="msg user">${message}</div>`;

  input.value = "";

  try {
    const res = await fetch("http://127.0.0.1:3001/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    // 🤖 respuesta IA
    chat.innerHTML += `<div class="msg bot">${data.reply}</div>`;

    // scroll automático
    window.scrollTo(0, document.body.scrollHeight);

  } catch (error) {
    chat.innerHTML += `<div class="msg bot">Error de conexión</div>`;
  }
}
</script>

</body>
</html>
